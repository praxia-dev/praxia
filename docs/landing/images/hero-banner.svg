<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif">
  <defs>
    <radialGradient id="rg" cx="50%" cy="0%" r="80%">
      <stop offset="0" stop-color="#c9a456" stop-opacity="0.18"/>
      <stop offset="0.7" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grid">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.025"/>
    </linearGradient>
    <pattern id="gridPattern" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="goldText" x1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9c378"/>
      <stop offset="1" stop-color="#c9a456"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="480" fill="#0a0a0f"/>
  <rect width="1200" height="480" fill="url(#gridPattern)"/>
  <rect width="1200" height="480" fill="url(#rg)"/>

  <!-- Brand mark -->
  <rect x="80" y="80" width="44" height="44" rx="8" fill="rgba(201,164,86,0.12)" stroke="#8b6f30" stroke-width="1.5"/>
  <text x="102" y="113" fill="#c9a456" font-size="20" text-anchor="middle">▣</text>
  <text x="142" y="113" fill="#ecedf0" font-size="22" font-weight="700">Praxia</text>

  <!-- Kicker -->
  <rect x="80" y="150" width="280" height="28" rx="14" fill="rgba(201,164,86,0.08)" stroke="rgba(201,164,86,0.25)"/>
  <text x="220" y="168" fill="#c9a456" font-size="12" font-weight="600" letter-spacing="0.07em" text-anchor="middle">OPEN SOURCE · APACHE 2.0 · ALPHA</text>

  <!-- Headline -->
  <text x="80" y="232" fill="#ecedf0" font-size="44" font-weight="700" letter-spacing="-0.02em">The multi-agent layer that</text>
  <text x="80" y="282" fill="#ecedf0" font-size="44" font-weight="700" letter-spacing="-0.02em"><tspan fill="url(#goldText)" font-style="italic">learns</tspan> with your team.</text>

  <!-- Sub -->
  <text x="80" y="324" fill="#a8acb8" font-size="16">Workflow-specialized multi-agent orchestrator with built-in</text>
  <text x="80" y="346" fill="#a8acb8" font-size="16"><tspan fill="#ecedf0" font-weight="600">personal-to-organizational memory cycling</tspan>. Senior staff's tacit knowledge</text>
  <text x="80" y="368" fill="#a8acb8" font-size="16">promotes itself into shared best practices — automatically.</text>

  <!-- Tag chips -->
  <g font-size="12">
    <rect x="80" y="396" width="110" height="28" rx="14" fill="#15171f" stroke="#23262f"/>
    <text x="135" y="414" fill="#ecedf0" text-anchor="middle">🐍 Python 3.11+</text>

    <rect x="200" y="396" width="160" height="28" rx="14" fill="#15171f" stroke="#23262f"/>
    <text x="280" y="414" fill="#ecedf0" text-anchor="middle">🧠 6 LTM backends</text>

    <rect x="370" y="396" width="220" height="28" rx="14" fill="#15171f" stroke="#23262f"/>
    <text x="480" y="414" fill="#ecedf0" text-anchor="middle">🤖 Claude · ChatGPT · Gemini · Qwen</text>

    <rect x="600" y="396" width="170" height="28" rx="14" fill="#15171f" stroke="#23262f"/>
    <text x="685" y="414" fill="#ecedf0" text-anchor="middle">🔐 SSO · RBAC · Audit</text>

    <rect x="780" y="396" width="180" height="28" rx="14" fill="#15171f" stroke="#23262f"/>
    <text x="870" y="414" fill="#ecedf0" text-anchor="middle">🔌 6 connectors (Pull + Push)</text>

    <rect x="970" y="396" width="120" height="28" rx="14" fill="#15171f" stroke="#23262f"/>
    <text x="1030" y="414" fill="#ecedf0" text-anchor="middle">🛡 Resource ACL</text>
  </g>

  <!-- Right: floating agents diagram -->
  <g transform="translate(880, 70)">
    <!-- Central hub -->
    <circle cx="120" cy="160" r="36" fill="rgba(201,164,86,0.18)" stroke="#c9a456" stroke-width="1.5"/>
    <text x="120" y="167" fill="#e9c378" font-size="14" font-weight="700" text-anchor="middle">Praxia</text>

    <!-- Satellite nodes -->
    <circle cx="40" cy="60" r="22" fill="#15171f" stroke="#23262f"/>
    <text x="40" y="65" fill="#ecedf0" font-size="13" text-anchor="middle">💰</text>

    <circle cx="200" cy="60" r="22" fill="#15171f" stroke="#23262f"/>
    <text x="200" y="65" fill="#ecedf0" font-size="13" text-anchor="middle">📈</text>

    <circle cx="240" cy="160" r="22" fill="#15171f" stroke="#23262f"/>
    <text x="240" y="165" fill="#ecedf0" font-size="13" text-anchor="middle">🏗</text>

    <circle cx="200" cy="260" r="22" fill="#15171f" stroke="#23262f"/>
    <text x="200" y="265" fill="#ecedf0" font-size="13" text-anchor="middle">🛒</text>

    <circle cx="40" cy="260" r="22" fill="#15171f" stroke="#23262f"/>
    <text x="40" y="265" fill="#ecedf0" font-size="13" text-anchor="middle">📑</text>

    <circle cx="0" cy="160" r="22" fill="#15171f" stroke="#23262f"/>
    <text x="0" y="165" fill="#ecedf0" font-size="13" text-anchor="middle">⚖️</text>

    <!-- Connecting lines -->
    <g stroke="#3a3e4f" stroke-width="1" stroke-dasharray="3 3">
      <line x1="56" y1="80" x2="98" y2="138"/>
      <line x1="184" y1="80" x2="142" y2="138"/>
      <line x1="218" y1="160" x2="156" y2="160"/>
      <line x1="184" y1="240" x2="142" y2="182"/>
      <line x1="56" y1="240" x2="98" y2="182"/>
      <line x1="22" y1="160" x2="84" y2="160"/>
    </g>
  </g>
</svg>
