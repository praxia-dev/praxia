  <rect x="280" y="166" width="280" height="34" rx="6" fill="#15171f" stroke="#c9a456"/>
  <text x="296" y="188" fill="#e9c378" font-size="13" font-weight="600">sales-agent</text>
  <text x="540" y="188" fill="#a8acb8" font-size="14" text-anchor="end">▾</text>

  <!-- Inputs -->
