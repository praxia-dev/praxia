  <text x="296" y="252" fill="#ecedf0" font-size="13">Acme Manufacturing Inc. (fictional)</text>

  <text x="280" y="280" fill="#a8acb8" font-size="11">Our product</text>
  <rect x="280" y="286" width="600" height="32" rx="6" fill="#15171f" stroke="#23262f"/>
  <text x="296" y="306" fill="#ecedf0" font-size="13">Praxia Sales</text>

