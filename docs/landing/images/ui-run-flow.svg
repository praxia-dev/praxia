  <text x="20" y="368" fill="#a8acb8" font-size="11">🐛 Issues</text>

  <!-- Tab bar -->
  <g font-size="12" fill="#a8acb8">
    <rect x="260" y="60" width="92" height="28" rx="14" fill="rgba(201,164,86,0.12)" stroke="#8b6f30"/>
    <text x="306" y="79" fill="#e9c378" font-weight="600" text-anchor="middle">🎬 Run Flow</text>
    <text x="380" y="79">🛠 Skill</text>
    <text x="430" y="79">🧠 Memory</text>
    <text x="500" y="79">🌙 Consolidate</text>
    <text x="595" y="79">📊 Dashboard</text>
    <text x="675" y="79">📝 Prompts</text>
    <text x="740" y="79">👥 Users</text>
    <text x="795" y="79">🔌 Connectors</text>
    <text x="880" y="79">🛡 Policies</text>
    <text x="950" y="79">💾 Admin</text>
    <text x="1020" y="79">ℹ About</text>
