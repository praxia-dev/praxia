  <rect x="280" y="340" width="600" height="58" rx="6" fill="#15171f" stroke="#23262f"/>
  <text x="296" y="360" fill="#ecedf0" font-size="12">Mid-term plan calls for ~30B JPY DX investment</text>
  <text x="296" y="378" fill="#ecedf0" font-size="12">~12B JPY estimated for electronic-component initiatives</text>

  <!-- Run button -->
  <rect x="280" y="420" width="120" height="36" rx="18" fill="url(#g1)"/>
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9c378"/>
      <stop offset="1" stop-color="#8b6f30"/>
    </linearGradient>
  </defs>
  <text x="340" y="443" fill="#1a1408" font-size="13" font-weight="700" text-anchor="middle">▶ Run</text>

  <!-- Output panel -->
  <rect x="280" y="478" width="900" height="220" rx="10" fill="#15171f" stroke="#28c941"/>
  <text x="296" y="502" fill="#28c941" font-size="11" font-weight="700">✓ FINAL OUTPUT</text>
  <text x="296" y="528" fill="#ecedf0" font-size="13" font-weight="600">## Executive Summary</text>
  <text x="296" y="552" fill="#a8acb8" font-size="12">- ~12B JPY of recent DX investment is in electronic-component initiatives</text>
  <text x="296" y="572" fill="#a8acb8" font-size="12">- IR materials show appetite for factory IoT / anomaly-detection projects</text>
  <text x="296" y="600" fill="#ecedf0" font-size="13" font-weight="600">## Top-3 pain hypotheses</text>
  <text x="296" y="622" fill="#a8acb8" font-size="12">1. Cross-factory data lag → Praxia Sales gives a clear roadmap</text>
  <text x="296" y="642" fill="#a8acb8" font-size="12">2. Veteran know-how transfer → covered by personal-to-org memory cycle</text>
  <text x="296" y="662" fill="#a8acb8" font-size="12">3. Skill variance across proposal teams → standardize via skill registry</text>
  <text x="296" y="688" fill="#6f7382" font-size="11">usage: in=4,852 out=2,140 tokens · model: anthropic/claude-opus-4-7</text>
</svg>
