<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif">
  <rect width="1200" height="720" fill="#0a0a0f"/>
  <rect x="0" y="0" width="1200" height="34" fill="#161821"/>
  <circle cx="20" cy="17" r="6" fill="#ff6058"/>
  <circle cx="40" cy="17" r="6" fill="#febc3a"/>
  <circle cx="60" cy="17" r="6" fill="#28c941"/>
  <text x="135" y="22" fill="#a8acb8" font-size="11">🔒 http://localhost:8501  —  Praxia / Policies</text>

  <rect x="0" y="34" width="240" height="686" fill="#0e1018"/>
  <text x="20" y="62" fill="#ecedf0" font-size="16" font-weight="700">🪡 Praxia</text>
  <text x="20" y="80" fill="#a8acb8" font-size="11">Logged in as</text>
  <text x="20" y="100" fill="#e9c378" font-size="13" font-weight="600">admin@acme</text>
  <text x="20" y="118" fill="#28c941" font-size="11">● Role: admin</text>

  <!-- Tab bar (highlight Policies) -->
  <g font-size="12" fill="#a8acb8">
    <text x="290" y="65">🎬 Run</text>
    <text x="345" y="65">🛠 Skill</text>
    <text x="400" y="65">🧠 Memory</text>
    <text x="475" y="65">🌙 Consolidate</text>
    <text x="565" y="65">📊 Dashboard</text>
    <text x="640" y="65">📝 Prompts</text>
    <text x="710" y="65">👥 Users</text>
    <text x="770" y="65">🔌 Connectors</text>
    <rect x="845" y="48" width="92" height="26" rx="13" fill="rgba(201,164,86,0.12)" stroke="#8b6f30"/>
    <text x="891" y="65" fill="#e9c378" font-weight="600" text-anchor="middle">🛡 Policies</text>
    <text x="950" y="65">💾 Admin</text>
  </g>

  <!-- Heading -->
  <text x="280" y="116" fill="#ecedf0" font-size="22" font-weight="700">🛡 Resource Access Policies</text>
  <text x="280" y="140" fill="#a8acb8" font-size="13">Glob-pattern allow/deny rules for connectors, memory, prompts, skills. Designed for enterprise IS departments.</text>

  <!-- Sub-tab bar -->
  <g font-size="12">
    <rect x="280" y="170" width="80" height="28" rx="14" fill="rgba(201,164,86,0.12)" stroke="#8b6f30"/>
    <text x="320" y="189" fill="#e9c378" font-weight="600" text-anchor="middle">List</text>
    <text x="395" y="189" fill="#a8acb8">Add</text>
    <text x="450" y="189" fill="#a8acb8">Test</text>
  </g>

  <!-- Table header -->
  <g font-size="11" fill="#a8acb8">
    <text x="296" y="226">ID</text>
    <text x="376" y="226">EFFECT</text>
    <text x="466" y="226">TYPE</text>
    <text x="566" y="226">PATTERN</text>
    <text x="846" y="226">ACTIONS</text>
    <text x="956" y="226">PRINCIPALS</text>
  </g>
  <line x1="280" y1="234" x2="1170" y2="234" stroke="#23262f"/>

  <!-- Row 1: deny -->
  <g font-size="12">
    <text x="296" y="258" fill="#6f7382">a3f8c2</text>
    <rect x="376" y="248" width="56" height="20" rx="10" fill="rgba(255,96,88,0.12)"/>
    <text x="404" y="262" fill="#ff8b80" font-weight="600" text-anchor="middle">deny</text>
    <text x="466" y="262" fill="#ecedf0">connector</text>
    <text x="566" y="262" fill="#ecedf0" font-family="JetBrains Mono, Consolas, monospace">box:/Confidential/*</text>
    <text x="846" y="262" fill="#ecedf0">read,write</text>
    <text x="956" y="262" fill="#ecedf0">role:member, role:viewer</text>
  </g>

  <!-- Row 2: deny -->
  <g font-size="12">
    <text x="296" y="288" fill="#6f7382">b1c4e9</text>
    <rect x="376" y="278" width="56" height="20" rx="10" fill="rgba(255,96,88,0.12)"/>
    <text x="404" y="292" fill="#ff8b80" font-weight="600" text-anchor="middle">deny</text>
    <text x="466" y="292" fill="#ecedf0">memory</text>
    <text x="566" y="292" fill="#ecedf0" font-family="JetBrains Mono, Consolas, monospace">memory:legal_*</text>
    <text x="846" y="292" fill="#ecedf0">*</text>
    <text x="956" y="292" fill="#ecedf0">role:viewer</text>
  </g>

  <!-- Row 3: allow -->
  <g font-size="12">
    <text x="296" y="318" fill="#6f7382">c5d2a7</text>
    <rect x="376" y="308" width="56" height="20" rx="10" fill="rgba(40,201,65,0.12)"/>
    <text x="404" y="322" fill="#5cf07c" font-weight="600" text-anchor="middle">allow</text>
    <text x="466" y="322" fill="#ecedf0">connector</text>
    <text x="566" y="322" fill="#ecedf0" font-family="JetBrains Mono, Consolas, monospace">salesforce:Lead.*</text>
    <text x="846" y="322" fill="#ecedf0">read,write</text>
    <text x="956" y="322" fill="#ecedf0">role:member</text>
  </g>

  <!-- Row 4: deny -->
  <g font-size="12">
    <text x="296" y="348" fill="#6f7382">d8f1b5</text>
    <rect x="376" y="338" width="56" height="20" rx="10" fill="rgba(255,96,88,0.12)"/>
    <text x="404" y="352" fill="#ff8b80" font-weight="600" text-anchor="middle">deny</text>
    <text x="466" y="352" fill="#ecedf0">connector</text>
    <text x="566" y="352" fill="#ecedf0" font-family="JetBrains Mono, Consolas, monospace">sharepoint:*MA_Project*</text>
    <text x="846" y="352" fill="#ecedf0">read,write</text>
    <text x="956" y="352" fill="#ecedf0">role:member, role:viewer</text>
  </g>

  <!-- Row 5: allow -->
  <g font-size="12">
    <text x="296" y="378" fill="#6f7382">e2a9f3</text>
    <rect x="376" y="368" width="56" height="20" rx="10" fill="rgba(40,201,65,0.12)"/>
    <text x="404" y="382" fill="#5cf07c" font-weight="600" text-anchor="middle">allow</text>
    <text x="466" y="382" fill="#ecedf0">skill</text>
    <text x="566" y="382" fill="#ecedf0" font-family="JetBrains Mono, Consolas, monospace">skill:investment_analyst</text>
    <text x="846" y="382" fill="#ecedf0">*</text>
    <text x="956" y="382" fill="#ecedf0">role:operator</text>
  </g>

  <!-- Test panel -->
  <rect x="280" y="430" width="890" height="220" rx="10" fill="#15171f" stroke="#23262f"/>
  <text x="296" y="454" fill="#ecedf0" font-size="14" font-weight="600">Dry-run policy decision</text>

  <text x="296" y="486" fill="#a8acb8" font-size="11">user_id</text>
  <rect x="296" y="492" width="180" height="28" rx="6" fill="#0a0a0f" stroke="#23262f"/>
  <text x="308" y="511" fill="#ecedf0" font-size="12">alice</text>

  <text x="496" y="486" fill="#a8acb8" font-size="11">role</text>
  <rect x="496" y="492" width="120" height="28" rx="6" fill="#0a0a0f" stroke="#23262f"/>
  <text x="508" y="511" fill="#ecedf0" font-size="12">member</text>

  <text x="636" y="486" fill="#a8acb8" font-size="11">resource_type</text>
  <rect x="636" y="492" width="120" height="28" rx="6" fill="#0a0a0f" stroke="#23262f"/>
  <text x="648" y="511" fill="#ecedf0" font-size="12">connector</text>

  <text x="776" y="486" fill="#a8acb8" font-size="11">action</text>
  <rect x="776" y="492" width="80" height="28" rx="6" fill="#0a0a0f" stroke="#23262f"/>
  <text x="788" y="511" fill="#ecedf0" font-size="12">read</text>

  <text x="296" y="540" fill="#a8acb8" font-size="11">resource_id</text>
  <rect x="296" y="546" width="560" height="28" rx="6" fill="#0a0a0f" stroke="#23262f"/>
  <text x="308" y="565" fill="#ecedf0" font-size="12" font-family="JetBrains Mono, monospace">box:/Confidential/q3-roadmap.pdf</text>

  <rect x="876" y="546" width="120" height="28" rx="14" fill="url(#g3)"/>
  <text x="936" y="565" fill="#1a1408" font-size="12" font-weight="700" text-anchor="middle">Evaluate</text>

  <!-- Decision result -->
  <rect x="296" y="592" width="858" height="44" rx="8" fill="rgba(255,96,88,0.08)" stroke="#ff6058"/>
  <text x="316" y="618" fill="#ff8b80" font-size="14" font-weight="700">🚫 Denied</text>
  <text x="408" y="618" fill="#ecedf0" font-size="12">— matched policy a3f8c2 (deny: Confidential folder restricted to operators+)</text>

  <defs>
    <linearGradient id="g3" x1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9c378"/>
      <stop offset="1" stop-color="#8b6f30"/>
    </linearGradient>
  </defs>
</svg>
