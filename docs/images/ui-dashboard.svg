  <text x="20" y="80" fill="#a8acb8" font-size="11">Dashboard scope</text>
  <rect x="20" y="90" width="200" height="28" rx="4" fill="#15171f" stroke="#c9a456"/>
  <text x="32" y="109" fill="#e9c378" font-size="12">org (default-org)</text>

  <!-- Tab bar (highlight Dashboard) -->
  <g font-size="12" fill="#a8acb8">
    <text x="290" y="65">🎬 Run</text>
    <text x="345" y="65">🛠 Skill</text>
    <text x="400" y="65">🧠 Memory</text>
