    <rect x="450" y="546" width="80" height="14" fill="url(#g2)"/>
    <text x="660" y="558" fill="#ecedf0" text-anchor="end">211</text>

    <text x="300" y="588" fill="#ecedf0">frank@acme</text>
    <rect x="450" y="576" width="64" height="14" fill="url(#g2)"/>
    <text x="660" y="588" fill="#ecedf0" text-anchor="end">170</text>
