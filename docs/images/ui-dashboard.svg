    <text x="742" y="588" fill="#ecedf0">patent_analyst</text>
    <rect x="900" y="576" width="65" height="14" fill="url(#g2)"/>
    <text x="1132" y="588" fill="#ecedf0" text-anchor="end">1,054</text>
  </g>

  <defs>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0" stop-color="#c9a456"/>
      <stop offset="1" stop-color="#8b6f30"/>
    </linearGradient>
