    <text x="300" y="498" fill="#ecedf0">charlie@acme</text>
    <rect x="450" y="486" width="125" height="14" fill="url(#g2)"/>
    <text x="660" y="498" fill="#ecedf0" text-anchor="end">328</text>

    <text x="300" y="528" fill="#ecedf0">dana@acme</text>
    <rect x="450" y="516" width="98" height="14" fill="url(#g2)"/>
