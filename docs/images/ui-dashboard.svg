    <text x="690" y="65">📝 Prompts</text>
    <text x="755" y="65">👥 Users</text>
    <text x="815" y="65">🔌 Connectors</text>
    <text x="900" y="65">🛡 Policies</text>
    <text x="975" y="65">💾 Admin</text>
