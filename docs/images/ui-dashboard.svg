  <text x="722" y="372" fill="#ecedf0" font-size="14" font-weight="600">Top skills (invocations)</text>
  <rect x="722" y="384" width="430" height="280" rx="10" fill="#15171f" stroke="#23262f"/>
  <g font-size="12">
    <text x="742" y="408" fill="#a8acb8">skill</text><text x="1132" y="408" fill="#a8acb8" text-anchor="end">count</text>
    <line x1="738" y1="416" x2="1136" y2="416" stroke="#23262f"/>
    <text x="742" y="438" fill="#ecedf0">sales_strategist</text>
    <rect x="900" y="426" width="220" height="14" fill="url(#g2)"/>
    <text x="1132" y="438" fill="#e9c378" text-anchor="end">3,124</text>

    <text x="742" y="468" fill="#ecedf0">legal_reviewer</text>
    <rect x="900" y="456" width="195" height="14" fill="url(#g2)"/>
    <text x="1132" y="468" fill="#ecedf0" text-anchor="end">2,841</text>

    <text x="742" y="498" fill="#ecedf0">design_reviewer</text>
    <rect x="900" y="486" width="155" height="14" fill="url(#g2)"/>
    <text x="1132" y="498" fill="#ecedf0" text-anchor="end">2,103</text>

    <text x="742" y="528" fill="#ecedf0">purchasing_analyst</text>
    <rect x="900" y="516" width="120" height="14" fill="url(#g2)"/>
