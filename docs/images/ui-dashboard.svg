    <rect x="500" y="170" width="208" height="78" rx="10" fill="#15171f" stroke="#23262f"/>
    <text x="518" y="193" fill="#a8acb8" font-size="11">Total flow runs</text>
    <text x="518" y="222" fill="#ecedf0" font-size="28" font-weight="700">3,847</text>
    <text x="518" y="240" fill="#28c941" font-size="11">▲ +28%</text>

    <rect x="720" y="170" width="208" height="78" rx="10" fill="#15171f" stroke="#23262f"/>
