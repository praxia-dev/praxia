<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif">
  <rect width="1200" height="720" fill="#0a0a0f"/>
  <rect x="0" y="0" width="1200" height="34" fill="#161821"/>
  <circle cx="20" cy="17" r="6" fill="#ff6058"/><circle cx="40" cy="17" r="6" fill="#febc3a"/><circle cx="60" cy="17" r="6" fill="#28c941"/>
  <text x="135" y="22" fill="#a8acb8" font-size="11">🔒 http://localhost:8501  —  Praxia / Connectors</text>

  <rect x="0" y="34" width="240" height="686" fill="#0e1018"/>
  <text x="20" y="62" fill="#ecedf0" font-size="16" font-weight="700">🪡 Praxia</text>
  <text x="20" y="86" fill="#a8acb8" font-size="11">User</text>
  <text x="20" y="106" fill="#e9c378" font-size="13" font-weight="600">alice@acme</text>
  <text x="20" y="124" fill="#28c941" font-size="11">● Role: operator</text>

  <!-- Tab bar -->
  <g font-size="12" fill="#a8acb8">
    <text x="290" y="65">🎬</text>
    <text x="320" y="65">🛠</text>
    <text x="350" y="65">🧠</text>
    <text x="385" y="65">🌙</text>
    <text x="425" y="65">📊</text>
    <text x="465" y="65">📝</text>
    <text x="500" y="65">👥</text>
    <rect x="540" y="48" width="118" height="26" rx="13" fill="rgba(201,164,86,0.12)" stroke="#8b6f30"/>
    <text x="599" y="65" fill="#e9c378" font-weight="600" text-anchor="middle">🔌 Connectors</text>
    <text x="685" y="65">🛡</text>
    <text x="725" y="65">💾</text>
    <text x="770" y="65">ℹ</text>
  </g>

  <text x="280" y="116" fill="#ecedf0" font-size="22" font-weight="700">🔌 External connectors</text>
  <text x="280" y="140" fill="#a8acb8" font-size="13">Pull data into agent flows · Push agent outputs back · ACL-enforced</text>

  <!-- Connector tiles -->
  <g>
    <!-- Box -->
    <rect x="280" y="170" width="190" height="100" rx="10" fill="#15171f" stroke="#c9a456"/>
    <text x="296" y="194" fill="#3372ff" font-size="22" font-weight="700">▣</text>
    <text x="320" y="194" fill="#ecedf0" font-size="14" font-weight="600">Box</text>
    <text x="296" y="220" fill="#a8acb8" font-size="11">OAuth2 / JWT</text>
    <text x="296" y="240" fill="#28c941" font-size="11">● Connected</text>
    <text x="296" y="258" fill="#a8acb8" font-size="11">Selected</text>

    <!-- SharePoint -->
    <rect x="490" y="170" width="190" height="100" rx="10" fill="#15171f" stroke="#23262f"/>
    <text x="506" y="194" fill="#0078d4" font-size="22" font-weight="700">⬚</text>
    <text x="530" y="194" fill="#ecedf0" font-size="14" font-weight="600">SharePoint</text>
    <text x="506" y="220" fill="#a8acb8" font-size="11">Microsoft Entra app</text>
    <text x="506" y="240" fill="#a8acb8" font-size="11">○ Not configured</text>

    <!-- Dropbox -->
    <rect x="700" y="170" width="190" height="100" rx="10" fill="#15171f" stroke="#23262f"/>
    <text x="716" y="194" fill="#0061ff" font-size="22" font-weight="700">▽</text>
    <text x="740" y="194" fill="#ecedf0" font-size="14" font-weight="600">Dropbox</text>
    <text x="716" y="220" fill="#a8acb8" font-size="11">OAuth2</text>
    <text x="716" y="240" fill="#a8acb8" font-size="11">○ Not configured</text>

    <!-- GDrive -->
    <rect x="910" y="170" width="190" height="100" rx="10" fill="#15171f" stroke="#23262f"/>
    <text x="926" y="194" fill="#34a853" font-size="22" font-weight="700">▲</text>
    <text x="950" y="194" fill="#ecedf0" font-size="14" font-weight="600">Google Drive</text>
    <text x="926" y="220" fill="#a8acb8" font-size="11">Service account / OAuth</text>
    <text x="926" y="240" fill="#28c941" font-size="11">● Connected</text>

    <!-- kintone -->
    <rect x="280" y="290" width="190" height="100" rx="10" fill="#15171f" stroke="#23262f"/>
    <text x="296" y="314" fill="#1f9d55" font-size="22" font-weight="700">◆</text>
    <text x="320" y="314" fill="#ecedf0" font-size="14" font-weight="600">kintone</text>
    <text x="296" y="340" fill="#a8acb8" font-size="11">API token</text>
    <text x="296" y="360" fill="#28c941" font-size="11">● Connected</text>

    <!-- Salesforce -->
    <rect x="490" y="290" width="190" height="100" rx="10" fill="#15171f" stroke="#23262f"/>
    <text x="506" y="314" fill="#0d9dda" font-size="22" font-weight="700">☁</text>
    <text x="530" y="314" fill="#ecedf0" font-size="14" font-weight="600">Salesforce</text>
    <text x="506" y="340" fill="#a8acb8" font-size="11">User+token / OAuth</text>
    <text x="506" y="360" fill="#28c941" font-size="11">● Connected</text>

    <!-- Add custom -->
    <rect x="700" y="290" width="400" height="100" rx="10" fill="#0e1018" stroke="#23262f" stroke-dasharray="4 4"/>
    <text x="900" y="334" fill="#a8acb8" font-size="13" text-anchor="middle">+ third-party plugin</text>
    <text x="900" y="356" fill="#6f7382" font-size="11" text-anchor="middle">pip install praxia-connector-* (entry-points auto-discovered)</text>
  </g>

  <!-- Op selector -->
  <g font-size="12">
    <text x="280" y="426" fill="#a8acb8" font-size="11">Operation</text>
    <rect x="280" y="436" width="80" height="30" rx="15" fill="rgba(201,164,86,0.12)" stroke="#8b6f30"/>
    <text x="320" y="455" fill="#e9c378" font-weight="600" text-anchor="middle">Pull</text>
    <text x="395" y="455" fill="#a8acb8">Push</text>
  </g>

  <!-- Path -->
  <text x="280" y="494" fill="#a8acb8" font-size="11">Path / folder ID / SOQL</text>
  <rect x="280" y="500" width="820" height="32" rx="6" fill="#15171f" stroke="#23262f"/>
  <text x="296" y="520" fill="#ecedf0" font-size="13" font-family="JetBrains Mono, Consolas, monospace">/Praxia/PitchDecks/2026Q4</text>

  <text x="280" y="554" fill="#a8acb8" font-size="11">Limit: 20</text>

  <rect x="280" y="568" width="100" height="34" rx="17" fill="url(#gpull)"/>
  <text x="330" y="589" fill="#1a1408" font-size="13" font-weight="700" text-anchor="middle">📥 Pull</text>

  <!-- Result -->
  <rect x="280" y="618" width="820" height="78" rx="10" fill="#15171f" stroke="#28c941"/>
  <text x="296" y="640" fill="#28c941" font-size="11" font-weight="700">✓ Pulled 12 items in 1.4s · subject to ACL (allowed by policy c5d2a7)</text>
  <text x="296" y="662" fill="#ecedf0" font-size="12">📥 Q3_Pitch_v2.pdf · Q3_Pitch_FINAL.pdf · CompetitorMap.pdf · Burn_Multiple_2026.xlsx · …</text>
  <text x="296" y="684" fill="#a8acb8" font-size="11">Click an item to inspect, or pass to a flow as input</text>

  <defs>
    <linearGradient id="gpull" x1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9c378"/>
      <stop offset="1" stop-color="#8b6f30"/>
    </linearGradient>
  </defs>
</svg>
