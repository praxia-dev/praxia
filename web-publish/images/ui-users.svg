  <text x="356" y="606" fill="#1a1408" font-size="12" font-weight="700" text-anchor="middle">Update</text>

  <rect x="430" y="586" width="160" height="32" rx="16" fill="rgba(140,200,255,0.12)" stroke="#8cc8ff"/>
