  <rect x="758" y="586" width="180" height="32" rx="16" fill="rgba(255,96,88,0.12)" stroke="#ff6058"/>
  <text x="848" y="606" fill="#ff8b80" font-size="12" font-weight="700" text-anchor="middle">🗑 Delete (audit logged)</text>

  <text x="296" y="654" fill="#a8acb8" font-size="11">All operations recorded in the audit log with action="user.update" / "user.delete" etc.</text>

  <defs>
    <linearGradient id="gu1" x1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9c378"/>
      <stop offset="1" stop-color="#8b6f30"/>
    </linearGradient>
