name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # Install with optional extras so the eval suite can exercise
          # PPTX / DOCX exporters and the FastAPI server module.
          pip install -e ".[dev,office]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy praxia

      - name: Smoke tests
        run: pytest tests/test_smoke.py -q --tb=short

      - name: Evaluation suite (regression-prevention)
        run: pytest tests/evaluation/ -m evaluation -q --tb=short
