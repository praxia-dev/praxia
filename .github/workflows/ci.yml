name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel the 3.11 job when 3.12 fails (or vice-versa) — we
      # want to see results for both Python versions.
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + dev + office, no heavy ML extras)
        run: |
          python -m pip install --upgrade pip
          # Install with optional extras so the eval suite can exercise
          # PPTX / DOCX exporters and the FastAPI server module.
          # We do NOT install [graph] / vector-DB extras here — those
          # pull in chromadb / qdrant / onnxruntime which are heavy and
          # not needed for the regression suite.
          pip install -e ".[dev,office]"

      - name: Lint (informational — not blocking)
        continue-on-error: true
        run: ruff check . || true

      - name: Type check (informational — not blocking)
        continue-on-error: true
        run: mypy praxia || true

      - name: Smoke tests
        run: pytest tests/test_smoke.py -q --tb=short

      - name: Evaluation suite (regression-prevention)
        run: pytest tests/evaluation/ -m evaluation -q --tb=short
