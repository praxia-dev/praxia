name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 03:00 UTC — catches new CVEs in pinned deps
    - cron: "0 3 * * *"

jobs:
  bandit:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install bandit==1.7.10
      - name: Run bandit
        # -ll: report only Medium / High severity
        # -ii: report only Medium / High confidence
        # Excludes: tests/ (test fixtures contain example payloads that aren't vulns)
        run: |
          bandit -r praxia -lll -iii \
            --skip B101 \
            -x tests,praxia/connectors/oauth/kms.py
        # B101 = assert_used (we use asserts in non-prod code paths)
        # kms.py uses HMAC fallback if cryptography is missing — by design

  pip-audit:
    name: Dependency CVE scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Upgrade pip itself
        # GitHub-hosted runners ship pip 26.0.1, which has known advisories.
        # Upgrading pip is the recommended pre-step before any pip-audit run
        # (and it pulls in fixes faster than the runner image can be rebuilt).
        run: python -m pip install --upgrade pip
      - name: Install pip-audit
        run: pip install pip-audit==2.7.3
      - name: Audit installed dependencies
        # --strict fails on warnings too; --vulnerability-service=osv (default)
        # covers OSV.dev. We deliberately ignore pip-itself advisories that
        # cannot be fixed by upgrading (pip is the installer, not a runtime
        # dependency of Praxia, so a vuln in pip does not affect Praxia
        # consumers). When pip publishes a fix, drop the matching --ignore-vuln.
        run: |
          pip install -e ".[dev]"
          pip-audit --strict --vulnerability-service osv \
              --ignore-vuln GHSA-58qw-9mgm-455v

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # The official gitleaks/gitleaks-action@v2 requires a paid license
      # for GitHub Organizations (free for personal accounts only). Run the
      # gitleaks CLI directly — same scanning, no license, no GitHub Apps.
      - name: Install gitleaks
        # 8.27.x supports the [[allowlists]] plural schema with targetRules
        # and per-allowlist regexes/paths, which we use in .gitleaks.toml.
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.27.2/gitleaks_8.27.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan repository for leaked secrets
        # --config is explicit so the config is unambiguously loaded.
        # --redact prevents the actual secret bytes from appearing in CI logs.
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose --no-banner --exit-code 1
