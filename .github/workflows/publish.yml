on:
  push:
    tags:
      # Only fire on PyPI-shaped Python package tags. Desktop installer
      # tags (e.g. `v0.1.0-alpha2`) live alongside in the same repo
      # but ship a separate artifact (NSIS / MSI on GitHub Releases),
      # not a wheel — they must not trigger this workflow.
      - 'v[0-9]+.[0-9]+.[0-9]+'        # v1.2.3  (stable)
      - 'v[0-9]+.[0-9]+.[0-9]+a[0-9]+' # v1.2.3a0 (PyPI alpha, PEP 440)
      - 'v[0-9]+.[0-9]+.[0-9]+b[0-9]+' # v1.2.3b0 (PyPI beta)
      - 'v[0-9]+.[0-9]+.[0-9]+rc[0-9]+' # v1.2.3rc1 (PyPI release candidate)

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions: { id-token: write }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.11' }
      - run: pip install build && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
