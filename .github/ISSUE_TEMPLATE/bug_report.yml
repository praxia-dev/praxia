name: Bug report
description: Something in Praxia isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: What happened
      description: What you expected vs. what actually happened
  - type: input
    attributes: {label: Praxia version, placeholder: "0.1.0a1"}
  - type: input
    attributes: {label: Python version, placeholder: "3.11.7"}
  - type: dropdown
    attributes:
      label: LLM provider
      options: [claude, chatgpt, gemini, deepseek, mistral, grok, qwen, llama, gemma, phi, qwen-local, other]
  - type: textarea
    attributes: {label: Steps to reproduce, render: bash}
  - type: textarea
    attributes: {label: Relevant logs, render: shell}
